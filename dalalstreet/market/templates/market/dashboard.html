<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dalal Street AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #1a1a2e; }
    .stock-card { border-radius: 12px; border: none; transition: transform 0.2s; }
    .stock-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .positive { color: #00b894; }
    .negative { color: #d63031; }
    .badge-up { background: #d4edda; color: #155724; }
    .badge-down { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
  <a href="{% url 'landing' %}" class="navbar-brand fw-bold fs-5 text-decoration-none">📈 Dalal Street AI</a>
  <div class="d-flex align-items-center gap-3">
    <span class="text-white-50">👤 {{ request.user.username }}</span>
    <span class="text-white fw-bold">₹{{ balance }}</span>
    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
</nav>


<div class="container py-4">
  <h5 class="fw-bold mb-3">📊 Live Market</h5>
  <div class="row g-3">
    {% for stock in stocks %}
    <div class="col-md-4">
      <div class="card stock-card shadow-sm p-3">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fw-bold">{{ stock.symbol }}</div>
            <div class="small text-muted">{{ stock.company_name }}</div>
          </div>
          <span class="badge {% if stock.change_percent >= 0 %}badge-up{% else %}badge-down{% endif %} px-2 py-1">
            {% if stock.change_percent >= 0 %}▲{% else %}▼{% endif %}
            {{ stock.change_percent }}%
          </span>
        </div>
        <div class="fs-4 fw-bold mt-2">₹{{ stock.current_price }}</div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

</body>
</html>
